timeout: 3
wallpaper: boot():/wallpaper.png
term_background: FF000000
term_foreground: CCCCCC
interface_resolution: 1280x720
interface_branding_colour: 1
interface_help_hidden: no
interface_help_colour: 1
interface_branding: Bleed (Limine 10.5.0)
editor_validation: no

/Bleed
    protocol: limine
    path: boot():/boot/bleed-kernel
    MODULE_PATH=boot():/boot/initrd.tar
    resolution: 1280x720
    kaslr: yes
    cmdline: shell-path=default

/Advanced Boot Options
//Feeble Mode (for Underpowered Machines)
    protocol: limine
    path: boot():/boot/bleed-kernel
    MODULE_PATH=boot():/boot/initrd.tar
    resolution: 960x540
    kaslr: no
    cmdline: shell-path=default

//Esoteric Mode (debugging features enabled)
    protocol: limine
    path: boot():/boot/bleed-kernel
    MODULE_PATH=boot():/boot/initrd.tar
    resolution: 1920x1080
    kaslr: yes
    cmdline: shell-path=default preferred-splash=bleed